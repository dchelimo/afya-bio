name: Build CSS and PDF

on:
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'src/**'
      - 'tailwind.config.js'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'requirements.txt'
      - '.github/workflows/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
            libcairo2 libgdk-pixbuf-2.0-0 libffi-dev \
            libharfbuzz0b libfontconfig1 shared-mime-info

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build site (Jinja → HTML)
        run: python scripts/build_site.py

      - name: Generate PDF
        run: python scripts/generate_pdf.py

      - name: Commit built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p dist
          git add -f dist/styles.css David-Chelimo-Resume.pdf
          find . -name "*.html" -not -path "*/.venv/*" -not -path "*/node_modules/*" | xargs git add
          git diff --cached --quiet || git commit -m "chore: rebuild site, CSS, and PDF [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/dchelimo/afya-bio.git
