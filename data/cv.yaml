about:
  pdf: false
  paragraphs:
    - >-
      I work at the intersection of clinical diagnostics, cancer genomics, and
      data workflows. At Labcorp, I support clinical NGS assays through variant
      review, QC, and continuous improvement of bioinformatics workflows in a
      high-throughput, regulated environment.
    - >-
      Previously, I helped build and scale the Genomic Analysis and Reporting
      (GAR) function at Foundation Medicine, curating ~95,000 samples and leading
      advanced analyses across complex cancer cases. Alongside that, I spearheaded
      adoption of agentic coding practices and AI coding assistants (e.g., Claude
      Code) to make our team's development and maintenance work faster, safer,
      and easier to share.
    - >-
      My next step is to deepen my software engineering skill set and own more of
      the pipeline and tooling layer — building reproducible, well-tested,
      AI-assisted workflows that bridge clinical bioinformatics and software
      engineering.

