<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page_title }} — David Chelimo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page_description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ css_path }}">
</head>
<body>

  <div class="site-bar"></div>

  <nav class="site-nav">
    <div class="site-nav-inner">
      <a href="{{ root }}" class="site-brand">David Chelimo</a>
      <ul class="site-nav-links">
        <li><a href="{{ root }}"            class="{{ 'active' if active == 'bio' }}">Bio</a></li>
        <li><a href="{{ root }}cv/"         class="{{ 'active' if active == 'cv' }}">CV</a></li>
        <li><a href="{{ root }}projects/"   class="{{ 'active' if active == 'projects' }}">Projects</a></li>
        <li><a href="{{ root }}blog/"       class="{{ 'active' if active == 'blog' }}">Blog</a></li>
      </ul>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer class="site-footer">
    &copy; <span id="year"></span> David Chelimo &middot; <a href="https://dchelimo.afyagateway.io">dchelimo.afyagateway.io</a>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  </footer>

</body>
</html>
